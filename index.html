<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador PHVA - DCU</title>

<style>
body{
    background:#1e1e2e;
    color:#cdd6f4;
    font-family:Arial,sans-serif;
    text-align:center;
}

h2{
    margin-top:20px;
}

#contenedor{
    position:relative;
    width:600px;
    height:350px;
    margin:20px auto;
    background:#252538;
    border-radius:10px;
}

.nodo{
    position:absolute;
    width:100px;
    height:50px;
    line-height:50px;
    border:2px solid;
    border-radius:8px;
    background:#313244;
    font-weight:bold;
}

#planear{
    left:50px;
    top:75px;
    border-color:#a6e3a1;
}

#hacer{
    left:450px;
    top:75px;
    border-color:#fab387;
}

#verificar{
    left:450px;
    top:255px;
    border-color:#f9e2af;
}

#actuar{
    left:50px;
    top:255px;
    border-color:#f38ba8;
}

#lineas{
    position:absolute;
    inset:0;
}

#proceso{
    position:absolute;
    width:24px;
    height:24px;
    border-radius:50%;
    background:#f5e0dc;
    border:3px solid #f38ba8;
    left:88px;
    top:88px;
    transition:all 2s linear;
}

button{
    padding:10px 20px;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;
}

#estado{
    margin-top:15px;
    font-size:18px;
}
</style>
</head>
<body>

<h2>Simulador Dinámico DCU-PHVA</h2>

<div id="contenedor">

<svg id="lineas" width="600" height="350">
    <line x1="100" y1="100" x2="500" y2="100"
          stroke="#45475a" stroke-width="4"/>
    <line x1="500" y1="100" x2="500" y2="280"
          stroke="#45475a" stroke-width="4"/>
    <line x1="500" y1="280" x2="100" y2="280"
          stroke="#45475a" stroke-width="4"/>
    <line x1="100" y1="280" x2="100" y2="100"
          stroke="#ba1818" stroke-width="4"
          stroke-dasharray="6,6"/>
</svg>

<div class="nodo" id="planear">Planear</div>
<div class="nodo" id="hacer">Hacer</div>
<div class="nodo" id="verificar">Verificar</div>
<div class="nodo" id="actuar">Actuar</div>

<div id="proceso"></div>

</div>

<div id="estado">
Estado: Listo para iniciar
</div>

<button id="btnIniciar" onclick="iniciarCiclo()">
Iniciar Iteración
</button>

<script>

let iteracion = 1;

const proceso = document.getElementById("proceso");
const estado = document.getElementById("estado");
const boton = document.getElementById("btnIniciar");

function esperar(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function mover(x,y){
    proceso.style.left = x + "px";
    proceso.style.top = y + "px";
    await esperar(2000);
}

async function iniciarCiclo(){

    boton.disabled = true;

    await mover(88,88);

    estado.innerHTML =
        `Iteración ${iteracion} - Planear: Analizando requisitos...`;

    await esperar(1000);

    await mover(488,88);

    estado.innerHTML =
        `Iteración ${iteracion} - Hacer: Creando soluciones de diseño...`;

    await esperar(1000);

    await mover(488,268);

    estado.innerHTML =
        `Iteración ${iteracion} - Verificar: ¿Satisface el diseño al usuario?`;

    await esperar(500);

    let respuesta = confirm(
        "¿Satisface el sistema los requerimientos del usuario?"
    );

    await mover(88,268);

    if(respuesta){

        estado.innerHTML =
            `Actuar: ¡Desarrollo exitoso en la iteración ${iteracion}!`;

        alert(
            `¡Sistema aprobado con éxito en la iteración ${iteracion}!`
        );

        boton.disabled = false;

    }else{

        estado.innerHTML =
            "Actuar: Requisitos NO satisfechos. Regresando al inicio...";

        alert(
            "Los requerimientos no se cumplieron. El ciclo vuelve a Planear."
        );

        await mover(88,88);

        iteracion++;

        await esperar(1000);

        iniciarCiclo();
    }
}

</script>

</body>
</html>
